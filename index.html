<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Iskaro — náhľady</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0b0b10; color: #f5f5f7; text-align: center;
    }
    .spark {
      background: linear-gradient(135deg, #f5c877, #e8a24a, #d07e2f);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      font-weight: 700;
    }
    p { color: #9a9aa5; max-width: 34ch; line-height: 1.6; }
    a { color: #e8a24a; }
  </style>
</head>
<body>
  <main>
    <h1><span class="spark">✦ Iskaro</span></h1>
    <p>Tu vznikajú náhľady nových webov. Ak vám prišiel odkaz, otvorte ho celý —
       vedie priamo na váš náhľad.</p>
    <p><a href="https://iskaro.sk">iskaro.sk</a></p>
  </main>
</body>
</html>
